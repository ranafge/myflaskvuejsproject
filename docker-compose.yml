version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    privileged: true
    environment:
      MYSQL_ROOT_PASSWORD: pass1478
      MYSQL_DATABASE: flask
      TZ: "Asia/Dhaka"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build: ./backend
    container_name: flask_backend
    restart: always
    ports:
      - "5001:5000"
    depends_on:
      - db    
    environment:
      DB_HOST: db 
      DB_USER: root
      DB_PASSWORD: pass1478
      DB_NAME: flask
      TZ: "Asia/Dhaka"
    volumes:
      - /etc/localtime:/etc/localtime:ro

  frontend:
    build: ./frontend
    container_name: vue_frontend
    restart: always
    ports:
      - "5174:5173"
    depends_on:
      - backend
    environment:
      TZ: "Asia/Dhaka"

volumes:
  mysql-data:
